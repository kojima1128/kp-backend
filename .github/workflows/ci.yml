name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        working-directory: portfolio-backend
        run: go mod download

      - name: Generate gqlgen artifacts
        working-directory: portfolio-backend
        run: go generate ./...

      - name: Build API
        working-directory: portfolio-backend
        run: go build ./cmd/api

      - name: Build worker
        working-directory: portfolio-backend
        run: go build ./cmd/worker
